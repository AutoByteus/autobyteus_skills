interface:
  display_name: "Software Engineering Workflow"
  short_description: "Design, runtime stacks, impl plan"
  default_prompt: "Use $software-engineering-workflow-skill with strict stage gates and ticket lifecycle discipline: keep active work in `tickets/in-progress/<ticket-name>/`; capture investigation-notes and detailed verifiable requirements first (`Draft` -> `Design-ready`), then for Small use implementation-plan solution sketch as design basis or for Medium/Large draft proposed-design first, build future-state runtime call stacks as to-be execution models with use cases sourced from both requirements and design-risk objectives, run iterative deep future-state runtime call stack reviews with immediate write-backs, and unlock implementation only after two consecutive clean rounds (`Candidate Go` then `Go Confirmed`). Keep Stage 5 focused on implementation plus unit/integration verification, then run mandatory Stage 6 aggregated validation (`API`/`E2E`/`System`) with classification/escalation (`Local Fix`/`Design Impact`/`Requirement Gap`) and mandatory investigation checkpoint rules before design/requirements write-backs. For required stage-boundary audible notifications, call `Speak` with `play=true` explicitly unless the user requested silent mode. Do not include manual testing by default. Finish with mandatory docs sync before handoff. Move ticket to `tickets/done/<ticket-name>/` only on explicit user completion/verification instruction; if reopened, move it back to `tickets/in-progress/<ticket-name>/` before new updates."
