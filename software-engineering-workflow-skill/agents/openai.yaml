interface:
  display_name: "Software Engineering Workflow"
  short_description: "Design, runtime stacks, impl plan"
  default_prompt: "Use $software-engineering-workflow-skill with strict stage gates and ticket lifecycle discipline: start by bootstrapping ticket context in order (`tickets/in-progress/<ticket-name>/` -> git worktree/branch when available -> `requirements.md` status `Draft`), create/update `workflow-state.md` with `Current Stage=0` and `Code Edit Permission=Locked`, then run investigation and refine requirements to `Design-ready`. Do not start investigation before the ticket bootstrap and `Draft` requirement are physically written. Before every stage transition, update `workflow-state.md` snapshot and transition log. No source-code edits are allowed unless `workflow-state.md` explicitly shows `Current Stage=5` and `Code Edit Permission=Unlocked` with Stage 4 `Go Confirmed` evidence. After requirements are design-ready, for Small use implementation-plan solution sketch as design basis or for Medium/Large draft proposed-design first, build future-state runtime call stacks as to-be execution models with use cases sourced from both requirements and design-risk objectives, run iterative deep future-state runtime call stack reviews with immediate write-backs, and unlock implementation only after two consecutive clean rounds (`Candidate Go` then `Go Confirmed`). Keep Stage 5 focused on implementation plus unit/integration verification, then run mandatory Stage 5.5 internal code review gate before Stage 6 aggregated validation (`API`/`E2E`); set `Code Edit Permission=Locked` at Stage 5.5/6 entry. In Stage 6, enforce acceptance-criteria closure: every `acceptance_criteria_id` from refined requirements must map to executable API/E2E scenarios and must pass (or be explicitly waived by user for infeasible cases); any `Unmapped`/`Not Run`/`Failed`/`Blocked` criterion keeps Stage 6 open and triggers re-entry loop until resolved. Enforce source-file size policy in Stage 5.5 (`>300` explicit SoC assessment; `>400` with added functionality defaults to `Design Impact` and design-chain re-entry). For any Stage 5.5/6 finding, require re-entry declaration (including `workflow-state.md`) and no direct code patching before upstream artifacts are updated; `Local Fix` must rerun `Stage 5 -> Stage 5.5` before returning to `Stage 6`; full-chain mapping is mandatory for `Design Impact` (`Stage 2 -> 3 -> 4 -> 5 -> 5.5`), `Requirement Gap` (`Stage 1 -> 2 -> 3 -> 4 -> 5 -> 5.5`), and unclear root cause (`Stage 0 -> 1 -> 2 -> 3 -> 4 -> 5 -> 5.5`). For required stage-boundary audible notifications, call `Speak` with `play=true` explicitly unless the user requested silent mode. Do not include manual testing by default. Finish with mandatory docs sync before handoff. Move ticket to `tickets/done/<ticket-name>/` only on explicit user completion/verification instruction; if reopened, move it back to `tickets/in-progress/<ticket-name>/` before new updates."
